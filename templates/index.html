<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>接続設定</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        input { padding: 10px; margin: 10px; width: 200px; }
        .btn { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>共有サーバー設定</h1>
    <input type="text" id="ip" placeholder="IPアドレス (例: 192.162.0.1)">
    <input type="text" id="port" placeholder="ポート (例: 8080)">
    <br>
    <button class="btn" onclick="connect()">作成して接続</button>

    <script>
        // 保存されたIPを読み込む
        window.onload = function() {
            if(localStorage.getItem('saved_ip')) {
                document.getElementById('ip').value = localStorage.getItem('saved_ip');
            }
        }

        function connect() {
            const ip = document.getElementById('ip').value;
            const port = document.getElementById('port').value;
            
            // IPをブラウザに保存
            localStorage.setItem('saved_ip', ip);

            // 指定されたURLへジャンプ
            // 実際には https://IP:PORT/share という形になります
            location.href = `/share?ip=${ip}&port=${port}`;
        }
    </script>
</body>
</html>
